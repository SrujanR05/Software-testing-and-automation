[pytest]
minversion = 8.0
addopts = -ra --strict-markers --reruns 1 --html=reports/report.html --self-contained-html
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: quick confidence checks
    regression: full regression coverage
    ui: user interface tests
    api: api validation tests
    pagination: pagination coverage
    sorting: sorting coverage
    calendar: calendar coverage
    session_timeout: session timeout coverage
    duplicate: duplicate record coverage
    export: export report coverage
    broken_links: broken link coverage
    cart: cart coverage
    rbac: role based access coverage
log_cli = true
log_cli_level = INFO
log_file = logs/framework.log
log_file_level = INFO
log_file_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
