<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TestSandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">TestSandbox</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="contact.html" class="nav-link">Contact Us</a></li>
            <li><a href="login.html" class="nav-link">Login</a></li>
            <li><a href="register.html" class="nav-link">Register</a></li>
            <li><a href="products.html" class="nav-link">Products</a></li>
            <li><a href="cart.html" class="nav-link">Cart</a></li>
            <li><a href="upload.html" class="nav-link">Upload & Download</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Sign In</h1>
        <p class="page-subtitle">Test validation messages by submitting invalid credentials.</p>

        <div class="card">
            <div id="error-msg" class="alert alert-danger" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Email Address / Username</label>
                    <input type="text" id="username" class="form-control" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Password123" required>
                </div>

                <button type="submit" id="login-btn" class="btn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
