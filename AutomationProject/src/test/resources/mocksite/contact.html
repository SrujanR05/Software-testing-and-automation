<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TestSandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">TestSandbox</a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="contact.html" class="nav-link">Contact Us</a></li>
            <li><a href="login.html" class="nav-link">Login</a></li>
            <li><a href="register.html" class="nav-link">Register</a></li>
            <li><a href="products.html" class="nav-link">Products</a></li>
            <li><a href="cart.html" class="nav-link">Cart</a></li>
            <li><a href="upload.html" class="nav-link">Upload & Download</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Contact Us</h1>
        <p class="page-subtitle">Submit the contact form below and verify submission details.</p>

        <div class="card">
            <div id="success-msg" class="alert alert-success" style="display: none;"></div>
            
            <form id="contact-form">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name *</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="subject" class="form-label">Subject *</label>
                    <input type="text" id="subject" name="subject" class="form-control" placeholder="Enter subject" required>
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message *</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Type your message here..." required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn">Send Message</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
